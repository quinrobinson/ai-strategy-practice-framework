/* ============================================================
   ASPF Design System — Tokens
   AI Strategy Practice Framework
   Adapted from APDF Design System by Quin Robinson
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

:root {
  /* ---------- Surfaces ---------- */
  --bg:           #0F0F0F;
  --bg-deep:      #000000;
  --surface:      #161616;
  --card:         #1A1A1A;
  --elevated:     #202020;

  /* ---------- Borders ---------- */
  --border:       #2C2C2C;
  --border-hover: #404040;
  --border-soft:  rgba(255, 255, 255, 0.06);
  --border-strong:rgba(255, 255, 255, 0.12);

  /* ---------- Foreground ---------- */
  --fg:           #F2F2F2;
  --fg-muted:     #999999;
  --fg-dim:       #787878;
  --fg-faint:     #555555;

  /* ---------- Brand accents ---------- */
  --brand-orange:      #E9810C;
  --brand-orange-soft: #FB923C;
  --brand-purple:      #863BFF;
  --brand-purple-soft: #C084FC;

  --grad-brand:      linear-gradient(90deg, #863BFF 0%, #C084FC 35%, #E9810C 100%);
  --grad-brand-soft: linear-gradient(90deg, rgba(134,59,255,0.18) 0%, rgba(233,129,12,0.18) 100%);
  --grad-brand-glow: radial-gradient(60% 80% at 30% 50%, rgba(134,59,255,0.22) 0%, transparent 65%),
                     radial-gradient(60% 80% at 80% 60%, rgba(233,129,12,0.18) 0%, transparent 65%);

  /* ---------- ASPF Entry Point colors ---------- */
  --entry-before:  #3B82F6;   /* Before — blue   */
  --entry-during:  #F59E0B;   /* During — amber  */
  --entry-after:   #EF4444;   /* After  — red    */

  /* ---------- Agent role colors ---------- */
  --role-strategy:    #C084FC;   /* AI Strategy Lead — purple     */
  --role-pm:          #F472B6;   /* AI Product Manager — pink     */
  --role-researcher:  #38BDF8;   /* AI Researcher — sky           */
  --role-ethics:      #34D399;   /* Ethics & Risk Advisor — emerald */
  --role-engineer:    #FB923C;   /* ML/AI Engineer — orange       */
  --role-change:      #FBBF24;   /* Change & Enablement — yellow  */
  --role-practice:    #A78BFA;   /* AI Practice Lead — violet     */
  --role-predictor:   #A8A29E;   /* Predictor — warm gray         */

  /* ---------- Type ---------- */
  --font-display: "Inter", ui-sans-serif, system-ui, sans-serif;
  --font-body:    "DM Sans", ui-sans-serif, system-ui, sans-serif;
  --font-mono:    "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;

  /* Type scale */
  --fs-display:   clamp(48px, 6vw, 88px);
  --fs-h1:        clamp(36px, 4vw, 56px);
  --fs-h2:        clamp(28px, 3vw, 40px);
  --fs-h3:        24px;
  --fs-h4:        18px;
  --fs-body:      14px;
  --fs-body-lg:   15px;
  --fs-small:     13px;
  --fs-xs:        12px;
  --fs-mono:      11px;
  --fs-mono-lg:   12px;

  --ls-mono:      0.08em;
  --ls-mono-wide: 0.16em;
  --ls-display:   -0.02em;

  --lh-tight:  1.05;
  --lh-snug:   1.3;
  --lh-base:   1.65;
  --lh-loose:  1.75;

  /* ---------- Radii ---------- */
  --radius-xs:  3px;
  --radius-sm:  6px;
  --radius-md:  8px;
  --radius-lg:  12px;
  --radius-pill:999px;

  /* ---------- Spacing ---------- */
  --s-1:  4px;  --s-2:  8px;  --s-3:  12px; --s-4:  16px;
  --s-5:  20px; --s-6:  24px; --s-8:  32px; --s-10: 40px;
  --s-12: 48px; --s-16: 64px; --s-20: 80px;

  /* ---------- Shadows ---------- */
  --shadow-sm:  0 1px 2px rgba(0,0,0,0.4);
  --shadow-md:  0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg:  0 12px 40px rgba(0,0,0,0.5);
  --shadow-glow-purple: 0 0 0 1px rgba(134,59,255,0.35), 0 0 32px rgba(134,59,255,0.25);
  --shadow-glow-orange: 0 0 0 1px rgba(233,129,12,0.35), 0 0 32px rgba(233,129,12,0.20);

  /* ---------- Motion ---------- */
  --ease-out:    cubic-bezier(0.2, 0.8, 0.2, 1);
  --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);
  --dur-fast:    120ms;
  --dur-base:    200ms;
  --dur-slow:    400ms;
}
  </style>
</head>

/* components.jsx — shared shell components */
/* Adapted from APDF Design System UI Kit */

const { useState } = React;

// ── Mode context — persists across pages ─────────────────────────────────────
// Simple global so mode survives navigation without prop drilling
window.ASPF_MODE = window.ASPF_MODE || 'team'; // 'team' | 'strategist'

function Mark({ size = 24 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style={{ display: 'block', flexShrink: 0 }}>
      <rect width="32" height="32" rx="8" fill="url(#aspf-grad)" />
      <path d="M8 22 L16 10 L24 22" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" fill="none" />
      <path d="M11 18 L21 18" stroke="white" strokeWidth="2" strokeLinecap="round" />
      <defs>
        <linearGradient id="aspf-grad" x1="0" y1="0" x2="32" y2="32">
          <stop offset="0%" stopColor="#863BFF" />
          <stop offset="100%" stopColor="#E9810C" />
        </linearGradient>
      </defs>
    </svg>
  );
}

function ModeToggle({ mode, onToggle }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8, padding: 3, gap: 2 }}>
      {[
        { id: 'team',       label: 'Product Team' },
        { id: 'strategist', label: 'AI Strategist' },
      ].map(opt => (
        <button
          key={opt.id}
          onClick={() => onToggle(opt.id)}
          style={{
            fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.10em',
            textTransform: 'uppercase', padding: '6px 12px', borderRadius: 6,
            border: 'none', cursor: 'pointer', fontWeight: 500,
            transition: 'all 150ms',
            background: mode === opt.id ? mode === 'strategist' ? 'linear-gradient(135deg, rgba(134,59,255,0.25), rgba(233,129,12,0.18))' : 'var(--elevated)' : 'transparent',
            color: mode === opt.id ? 'var(--fg)' : 'var(--fg-faint)',
            boxShadow: mode === opt.id && opt.id === 'strategist' ? '0 0 12px rgba(134,59,255,0.2)' : 'none',
          }}
        >
          {opt.label}
        </button>
      ))}
    </div>
  );
}

function Header({ active, go, mode, onModeToggle }) {
  return (
    <header style={{ position: 'sticky', top: 0, zIndex: 100, background: 'rgba(15,15,15,0.88)', backdropFilter: 'blur(12px)', WebkitBackdropFilter: 'blur(12px)', borderBottom: '1px solid var(--border)' }}>
      <div style={{ maxWidth: 1100, margin: '0 auto', padding: '0 48px', height: 64, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>

        {/* Brand */}
        <button onClick={() => go('home')} style={{ display: 'flex', alignItems: 'center', gap: 10, background: 'transparent', border: 'none', cursor: 'pointer', padding: 0 }}>
          <Mark size={24} />
          <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'var(--fg-muted)', fontWeight: 500 }}>ASPF</span>
        </button>

        {/* Center — mode toggle */}
        {onModeToggle && (
          <ModeToggle mode={mode || 'team'} onToggle={onModeToggle} />
        )}

        {/* Right — nav */}
        <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
          <button onClick={() => go('skills')} style={{ background: 'none', border: 'none', fontFamily: 'var(--font-mono)', fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: active === 'skills' ? 'var(--fg)' : 'var(--fg-muted)', cursor: 'pointer' }}>Skills</button>
          <a href="https://github.com/quinrobinson/ai-strategy-practice-framework" target="_blank" rel="noopener noreferrer" style={{ fontFamily: 'var(--font-mono)', fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--fg-muted)', textDecoration: 'none' }}>GitHub →</a>
        </div>
      </div>
    </header>
  );
}

function Page({ children, ambient }) {
  return (
    <div style={{ minHeight: '100vh', background: 'var(--bg)', color: 'var(--fg)', position: 'relative', overflowX: 'hidden' }}>
      {ambient && <div aria-hidden style={{ position: 'fixed', inset: 0, background: 'var(--grad-brand-glow)', opacity: 0.6, pointerEvents: 'none', zIndex: 0 }} />}
      <div style={{ position: 'relative', zIndex: 1 }}>{children}</div>
    </div>
  );
}

function Container({ children, style }) {
  return <div style={{ maxWidth: 1100, margin: '0 auto', padding: '0 48px', ...style }}>{children}</div>;
}

function Eyebrow({ children, color, style }) {
  return (
    <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, letterSpacing: '0.16em', textTransform: 'uppercase', color: color || 'var(--fg-dim)', fontWeight: 500, ...style }}>
      {children}
    </div>
  );
}

function Button({ children, variant = 'ghost', onClick, style, href }) {
  const base = { fontFamily: 'var(--font-mono)', fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', padding: '10px 18px', borderRadius: 6, cursor: 'pointer', fontWeight: 500, transition: 'border-color 200ms, background 200ms, color 200ms', display: 'inline-flex', alignItems: 'center', gap: 8, textDecoration: 'none' };
  const variants = {
    ghost:   { background: 'transparent', color: 'var(--fg)', border: '1px solid var(--border)' },
    soft:    { background: 'transparent', color: 'var(--fg-muted)', border: '1px solid var(--border)' },
    primary: { background: 'linear-gradient(135deg, rgba(134,59,255,0.32) 0%, rgba(184,76,180,0.20) 50%, rgba(233,129,12,0.22) 100%)', color: 'var(--fg)', border: '1px solid rgba(134,59,255,0.4)', boxShadow: '0 0 28px rgba(134,59,255,0.22), inset 0 1px 0 rgba(255,255,255,0.04)' },
    strategist: { background: 'linear-gradient(135deg, rgba(134,59,255,0.28), rgba(233,129,12,0.20))', color: 'var(--fg)', border: '1px solid rgba(134,59,255,0.5)', boxShadow: '0 0 20px rgba(134,59,255,0.18)' },
  };
  if (href) return <a href={href} target="_blank" rel="noopener noreferrer" style={{ ...base, ...variants[variant], ...style }}>{children}</a>;
  return <button onClick={onClick} style={{ ...base, ...variants[variant], ...style }}>{children}</button>;
}

function Tag({ color, children, dot, style }) {
  const c = color || 'var(--fg-muted)';
  return (
    <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.10em', textTransform: 'uppercase', padding: '4px 8px', borderRadius: 4, border: `1px solid color-mix(in srgb, ${c} 35%, transparent)`, color: c, display: 'inline-flex', alignItems: 'center', gap: 6, whiteSpace: 'nowrap', ...style }}>
      {dot && <span style={{ width: 5, height: 5, borderRadius: 999, background: c, flexShrink: 0 }} />}
      {children}
    </span>
  );
}

function EntryTag({ id }) {
  const map = {
    before: { color: 'var(--entry-before)', label: 'Before' },
    during: { color: 'var(--entry-during)', label: 'During' },
    after:  { color: 'var(--entry-after)',  label: 'After'  },
    all:    { color: 'var(--fg-dim)',        label: 'All'    },
  };
  const e = map[id] || map.all;
  return <Tag color={e.color} dot>{e.label}</Tag>;
}

function GradRule() {
  return <div aria-hidden style={{ height: 1, background: 'var(--grad-brand)', opacity: 0.35 }} />;
}

function CopyButton({ text, color }) {
  const [copied, setCopied] = React.useState(false);
  const handleCopy = () => {
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };
  return (
    <button onClick={handleCopy} style={{ fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.10em', textTransform: 'uppercase', padding: '5px 12px', borderRadius: 4, border: `1px solid ${copied ? color : 'var(--border)'}`, background: copied ? `color-mix(in srgb, ${color || 'var(--fg)'} 12%, transparent)` : 'transparent', color: copied ? (color || 'var(--fg)') : 'var(--fg-muted)', cursor: 'pointer', transition: 'all 200ms' }}>
      {copied ? 'Copied ✓' : 'Copy'}
    </button>
  );
}

                { id: 'code', label: 'Claude Code', sub: 'Command line — skill files load from the repo' },

                <button
                  key={opt.id}

                  style={{
                    textAlign: 'left',

                  <div style={{ fontFamily: 'var(--font-display)', fontSize: 13, fontWeight: 600, color: 'var(--fg)', marginBottom: 3 }}>{opt.label}</div>
                  <div style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--fg-muted)' }}>{opt.sub}</div>
                </button>

            </div>

            {/* Instructions */}
            {surface === 'chat' && (
              <div style={{ border: `1px solid color-mix(in srgb, ${color} 20%, var(--border))`, borderRadius: 8, overflow: 'hidden' }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '10px 14px', borderBottom: '1px solid var(--border)', background: 'var(--bg)' }}>
                  <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.10em', textTransform: 'uppercase', color: 'var(--fg-faint)' }}>Strategist kickoff prompt — {active.label}</span>
                  <CopyButton text={strategistChatPrompts[activeEntry]} color={color} />
                </div>
                <pre style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--fg-muted)', lineHeight: 1.6, padding: '14px', margin: 0, whiteSpace: 'pre-wrap', wordBreak: 'break-word', maxHeight: 200, overflowY: 'auto', background: 'var(--bg)' }}>{strategistChatPrompts[activeEntry]}</pre>
                <div style={{ padding: '12px 14px', borderTop: '1px solid var(--border)', background: 'var(--bg)' }}>
                  <a href="https://claude.ai" target="_blank" rel="noopener noreferrer" style={{ fontFamily: 'var(--font-mono)', fontSize: 11, letterSpacing: '0.10em', textTransform: 'uppercase', padding: '8px 16px', borderRadius: 6, background: `color-mix(in srgb, ${color} 18%, transparent)`, color: color, border: `1px solid color-mix(in srgb, ${color} 35%, transparent)`, textDecoration: 'none', display: 'inline-block' }}>
                    Open Claude →
                  </a>
                </div>
              </div>
            )}

            {surface === 'code' && (
              <div style={{ border: `1px solid color-mix(in srgb, ${color} 20%, var(--border))`, borderRadius: 8, padding: '20px' }}>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 14, marginBottom: 20 }}>
                  {[
                    { n: '01', content: <>Clone the repo and open in Claude Code: <code style={{ fontFamily: 'var(--font-mono)', fontSize: 11, padding: '1px 5px', borderRadius: 3, background: 'var(--elevated)', border: '1px solid var(--border)' }}>claude</code></> },
                    { n: '02', content: <>Run <code style={{ fontFamily: 'var(--font-mono)', fontSize: 11, padding: '1px 5px', borderRadius: 3, background: 'var(--elevated)', border: '1px solid var(--border)', color: color }}>{active.startCmd}</code> and describe your {active.label.toLowerCase()} focus</> },
                    { n: '03', content: <>Use <code style={{ fontFamily: 'var(--font-mono)', fontSize: 11, padding: '1px 5px', borderRadius: 3, background: 'var(--elevated)', border: '1px solid var(--border)', color: 'var(--brand-orange-soft)' }}>/project:deck [skill]</code> to generate a stakeholder-ready PowerPoint</> },
                  ].map(s => (
                    <div key={s.n} style={{ display: 'flex', gap: 14, alignItems: 'flex-start' }}>
                      <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: color, flexShrink: 0, paddingTop: 2 }}>{s.n}</span>
                      <span style={{ fontFamily: 'var(--font-body)', fontSize: 14, color: 'var(--fg-muted)', lineHeight: 1.5 }}>{s.content}</span>
                    </div>
                  ))}
                </div>
                <a href="https://github.com/quinrobinson/ai-strategy-practice-framework" target="_blank" rel="noopener noreferrer" style={{ fontFamily: 'var(--font-mono)', fontSize: 11, letterSpacing: '0.10em', textTransform: 'uppercase', padding: '10px 18px', borderRadius: 6, background: `color-mix(in srgb, ${color} 18%, transparent)`, color: color, border: `1px solid color-mix(in srgb, ${color} 35%, transparent)`, textDecoration: 'none', display: 'inline-block' }}>
                  Clone repo →
                </a>
              </div>
            )}
          </div>
        </div>

        {/* PowerPoint callout */}
        <div style={{ marginTop: 48, padding: '20px 24px', border: '1px solid var(--border)', borderRadius: 10, background: 'var(--card)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 24 }}>
          <div>
            <div style={{ fontFamily: 'var(--font-display)', fontSize: 14, fontWeight: 600, marginBottom: 4 }}>Every artifact generates a deck.</div>
            <div style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--fg-muted)', lineHeight: 1.5 }}>
              Run <code style={{ fontFamily: 'var(--font-mono)', fontSize: 11, padding: '1px 5px', borderRadius: 3, background: 'var(--elevated)', border: '1px solid var(--border)', color: 'var(--brand-orange-soft)' }}>/project:deck [skill]</code> in Claude Code to generate a .pptx file from any skill output. Claude Chat users get a structured prompt to paste into a new conversation.
            </div>
          </div>
          <Button onClick={() => go('skills')} style={{ flexShrink: 0 }}>View all skills →</Button>
        </div>

        {/* Bottom padding */}
        <div style={{ height: 96 }} />
      </div>

      <Footer go={go} />
    </Page>
  );
}

function SkillsPage({ go }) {

          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12, marginTop: 4 }}>
            {['Download or clone the repo', 'Load or upload the .md file', 'Run the session — Claude has full context'].map((s, i) => (
              <div key={i} style={{ display: 'flex', alignItems: 'flex-start', gap: 10 }}>
                <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--entry-before)', letterSpacing: '0.06em', flexShrink: 0 }}>{String(i + 1).padStart(2, '0')}</span>
                <span style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--fg)' }}>{s}</span>

        {/* Filter tabs */}
        <div style={{ display: 'flex', gap: 8, marginBottom: 28, flexWrap: 'wrap' }}>

              {opt.id !== 'all' && <span style={{ display: 'inline-block', width: 5, height: 5, borderRadius: 999, background: opt.color, marginRight: 7, verticalAlign: 'middle' }} />}

            return (
              <div key={skill.id} style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 10, padding: '20px 22px', display: 'flex', flexDirection: 'column', gap: 12, minHeight: 260, position: 'relative' }}>
                {skill.step && (
                  <div style={{ position: 'absolute', top: 16, right: 18, fontFamily: 'var(--font-mono)', fontSize: 20, fontWeight: 600, color: 'var(--border)', letterSpacing: '-0.02em' }}>

                  </div>
                </div>

                <div style={{ marginTop: 'auto', display: 'flex', gap: 8 }}>
                  <Button href={`https://github.com/quinrobinson/ai-strategy-practice-framework/blob/main/skills/${skill.file}`}>↓ Download</Button>
                  <Button href={`https://github.com/quinrobinson/ai-strategy-practice-framework/blob/main/skills/${skill.file}`}>View →</Button>
                </div>
              </div>
            );
          })}
        </div>

        {/* Failure mode library special card */}
        <div style={{ marginTop: 48 }}>
          <GradRule />
          <div style={{ marginTop: 48 }}>
            <Eyebrow style={{ marginBottom: 8, color: 'var(--role-predictor)' }}>● Always Active — Loaded by Predictor</Eyebrow>
            <h2 style={{ fontFamily: 'var(--font-display)', fontSize: 28, fontWeight: 600, lineHeight: 1.2, marginBottom: 24 }}>Failure Mode Library</h2>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 2 }}>
              {failureModes.map(fm => (
                <div key={fm.id} style={{ padding: '16px 18px', border: '1px solid var(--border)', background: 'var(--card)', borderRadius: 6, display: 'flex', flexDirection: 'column', gap: 6 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--fg-faint)', letterSpacing: '0.08em' }}>{fm.id}</span>
                    <span style={{ fontFamily: 'var(--font-mono)', fontSize: 9, color: 'var(--fg-faint)', border: '1px solid var(--border)', padding: '2px 6px', borderRadius: 3, textTransform: 'uppercase', letterSpacing: '0.06em' }}>{fm.when}</span>
                  </div>
                  <div style={{ fontFamily: 'var(--font-display)', fontSize: 13, fontWeight: 600, color: 'var(--fg)' }}>{fm.name}</div>
                  <div style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--fg-dim)', fontStyle: 'italic', lineHeight: 1.4 }}>Signal: {fm.signal}</div>
                </div>
              ))}
            </div>
          </div>
        </div>

      </Container>
      <Footer />
    </Page>
  );
}

          Role Agents
        </h1>

        </p>

        <div style={{ display: 'flex', gap: 16, padding: '18px 24px', border: '1px solid color-mix(in srgb, var(--brand-purple) 25%, var(--border))', borderRadius: 10, background: 'rgba(134,59,255,0.04)', marginBottom: 40, maxWidth: 900 }}>
          <div style={{ width: 8, height: 8, borderRadius: 999, background: 'var(--brand-purple-soft)', flexShrink: 0, marginTop: 6 }} />

                  <span style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--fg-dim)' }}>{agent.sub}</span>
                  {agent.commands.length > 0 && (
                    <div style={{ marginTop: 8, display: 'flex', flexWrap: 'wrap', gap: 4 }}>
                      {agent.commands.map(c => (
                        <code key={c} style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--brand-orange-soft)', letterSpacing: '0.02em', border: '1px solid var(--border)', padding: '2px 6px', borderRadius: 3, background: 'var(--elevated)' }}>{c}</code>
                      ))}
                    </div>
                  )}
                </div>

                {/* Activated when */}
                <div style={{ padding: '22px 22px', background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 10, display: 'flex', flexDirection: 'column', gap: 10 }}>
                  <Eyebrow color="var(--fg-muted)">● Activated when</Eyebrow>
                  <div style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--fg-muted)', lineHeight: 1.6 }}>{agent.activatedWhen}</div>
                </div>

                {/* Role context */}
                <div style={{ padding: '22px 22px', background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 10, display: 'flex', flexDirection: 'column', gap: 10 }}>
                  <Eyebrow color="var(--fg-dim)">ⓘ Role in session</Eyebrow>
                  <div style={{ fontFamily: 'var(--font-body)', fontSize: 13, fontStyle: 'italic', color: 'var(--fg-muted)', lineHeight: 1.6 }}>
                    {isPredictor

                  </div>

                  )}
                </div>

            );
          })}
        </div>

        {/* Multi-agent callout */}
        <div style={{ marginTop: 48, padding: '24px 28px', border: '1px solid var(--border)', borderRadius: 10, background: 'var(--card)', display: 'grid', gridTemplateColumns: '1fr auto', gap: 32, alignItems: 'center' }}>

            <div style={{ fontFamily: 'var(--font-body)', fontSize: 14, color: 'var(--fg-muted)', lineHeight: 1.6, maxWidth: 560 }}>

            </div>
          </div>
          <Button variant="primary" onClick={() => go('tree')}>Start the decision tree →</Button>
        </div>

      </Container>
      <Footer />
    </Page>
  );
}

function DecisionTreePage({ go }) {
  const { entryPoints, skills, agents } = window.ASPF_DATA;
  const [selectedEntry, setSelectedEntry] = React.useState(null);
  const [selectedSkill, setSelectedSkill] = React.useState(null);

  const entryColors = { before: 'var(--entry-before)', during: 'var(--entry-during)', after: 'var(--entry-after)' };

  const beforeSkills = skills.filter(s => s.entryPoint === 'before').sort((a, b) => a.step - b.step);
  const duringSkills = skills.filter(s => s.entryPoint === 'during');
  const afterSkills  = skills.filter(s => s.entryPoint === 'after');
  const alwaysSkills = skills.filter(s => s.entryPoint === 'all');

  const skillsByEntry = { before: beforeSkills, during: duringSkills, after: afterSkills };

  const relevantAgents = selectedEntry
    ? agents.filter(a => a.alwaysActive || a.commands.some(c => {
        if (selectedEntry === 'before') return c.includes('diagnose');
        if (selectedEntry === 'during') return c.includes('audit');
        if (selectedEntry === 'after') return c.includes('retro');
        return false;
      }))
    : [];

  const layers = [
    { label: 'Layer 0', name: 'Entry Detection', desc: 'Passive language signal detection from opening message. Fallback to one clarifying question if ambiguous.', color: 'var(--fg-dim)' },
    { label: 'Layer 1', name: 'Context Snapshot', desc: 'Three questions: domain, team composition, prior decisions. Predictor first sweep runs immediately after.', color: 'var(--brand-orange)' },
    { label: 'Layer 2', name: 'Branch Intake', desc: 'Framing questions together, then adaptive follow-ups. Agents activated by need. Skills routed in sequence.', color: 'var(--brand-purple-soft)' },
    { label: 'Layer 3', name: 'Synthesis', desc: 'Session closes: agents activated, skills run, Predictor flags, open questions, one explicit next action.', color: 'var(--fg)' },
  ];

  return (
    <Page>
      <Header active="tree" go={go} />
      <Container style={{ paddingTop: 32, paddingBottom: 96 }}>

        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 32 }}>
          <Button onClick={() => go('home')}>← Home</Button>
        </div>

        <Eyebrow style={{ marginBottom: 16 }}>Framework</Eyebrow>
        <h1 style={{ fontFamily: 'var(--font-display)', fontSize: 'clamp(36px, 4vw, 52px)', fontWeight: 600, lineHeight: 1.08, letterSpacing: '-0.02em', marginBottom: 12 }}>
          The Decision Tree
        </h1>
        <p style={{ fontFamily: 'var(--font-body)', fontSize: 15, color: 'var(--fg-muted)', lineHeight: 1.65, maxWidth: 640, marginBottom: 48 }}>
          Claude runs four layers every session — detecting your entry point, collecting context, running the branch intake, and synthesizing outputs. Select an entry point to explore the path.
        </p>

        {/* Layers */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 2, marginBottom: 48 }}>
          {layers.map((l, i) => (
            <div key={l.label} style={{ padding: '20px 20px', border: '1px solid var(--border)', background: 'var(--card)', borderRadius: 8, position: 'relative' }}>
              {i < layers.length - 1 && (
                <div style={{ position: 'absolute', right: -12, top: '50%', transform: 'translateY(-50%)', zIndex: 2, fontFamily: 'var(--font-mono)', fontSize: 14, color: 'var(--fg-faint)' }}>→</div>
              )}
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--fg-faint)', marginBottom: 8 }}>{l.label}</div>
              <div style={{ fontFamily: 'var(--font-display)', fontSize: 14, fontWeight: 600, color: l.color, marginBottom: 8 }}>{l.name}</div>
              <div style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--fg-muted)', lineHeight: 1.55 }}>{l.desc}</div>
            </div>
          ))}
        </div>

        <GradRule />

        {/* Entry Point selector */}
        <div style={{ marginTop: 48, marginBottom: 32 }}>
          <Eyebrow style={{ marginBottom: 16 }}>Select your entry point</Eyebrow>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>
            {entryPoints.map(ep => {
              const isSelected = selectedEntry === ep.id;
              const c = entryColors[ep.id];
              return (
                <button key={ep.id} onClick={() => { setSelectedEntry(isSelected ? null : ep.id); setSelectedSkill(null); }} style={{ padding: '20px 22px', border: `1px solid ${isSelected ? c : 'var(--border)'}`, borderRadius: 10, background: isSelected ? `color-mix(in srgb, ${c} 8%, var(--card))` : 'var(--card)', cursor: 'pointer', textAlign: 'left', transition: 'all 200ms', display: 'flex', flexDirection: 'column', gap: 8 }}>
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                    <Tag color={c} dot>{ep.label}</Tag>
                    {isSelected && <span style={{ fontFamily: 'var(--font-mono)', fontSize: 9, color: c, letterSpacing: '0.10em', textTransform: 'uppercase' }}>Selected</span>}
                  </div>
                  <div style={{ fontFamily: 'var(--font-display)', fontSize: 14, fontWeight: 600, color: isSelected ? 'var(--fg)' : 'var(--fg-muted)', lineHeight: 1.3 }}>{ep.question}</div>
                  <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: isSelected ? c : 'var(--fg-faint)', letterSpacing: '0.08em' }}>
                    {skillsByEntry[ep.id]?.length} skill{skillsByEntry[ep.id]?.length !== 1 ? 's' : ''} in sequence
                  </div>
                </button>
              );
            })}
          </div>
        </div>

        {/* Skill sequence for selected entry */}
        {selectedEntry && (
          <div style={{ marginBottom: 40 }}>
            <Eyebrow style={{ marginBottom: 16, color: entryColors[selectedEntry] }}>
              ● {selectedEntry.toUpperCase()} — Skill Sequence
            </Eyebrow>

            <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
              {skillsByEntry[selectedEntry].map((skill, idx) => {
                const isSelected = selectedSkill === skill.id;
                const ec = entryColors[selectedEntry];
                return (
                  <div key={skill.id}>
                    <button onClick={() => setSelectedSkill(isSelected ? null : skill.id)} style={{ width: '100%', textAlign: 'left', padding: '16px 20px', border: `1px solid ${isSelected ? ec : 'var(--border)'}`, borderRadius: isSelected ? '8px 8px 0 0' : 8, background: isSelected ? `color-mix(in srgb, ${ec} 6%, var(--card))` : 'var(--card)', cursor: 'pointer', display: 'grid', gridTemplateColumns: '48px 1fr auto', gap: 16, alignItems: 'center', transition: 'all 200ms' }}>
                      <span style={{ fontFamily: 'var(--font-mono)', fontSize: 16, fontWeight: 600, color: isSelected ? ec : 'var(--border)' }}>
                        {String(skill.step).padStart(2, '0')}
                      </span>
                      <div>
                        <div style={{ fontFamily: 'var(--font-display)', fontSize: 14, fontWeight: 600, color: isSelected ? 'var(--fg)' : 'var(--fg-muted)', marginBottom: 2 }}>{skill.file}</div>
                        <div style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--fg-dim)', lineHeight: 1.4 }}>{skill.desc}</div>
                      </div>
                      <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--fg-faint)' }}>{isSelected ? '▴' : '▾'}</span>
                    </button>

                    {isSelected && (
                      <div style={{ padding: '20px 22px 20px 84px', border: `1px solid ${ec}`, borderTop: 'none', borderRadius: '0 0 8px 8px', background: `color-mix(in srgb, ${ec} 4%, var(--card))`, display: 'flex', flexDirection: 'column', gap: 12 }}>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 16 }}>
                          <div>
                            <span style={{ fontFamily: 'var(--font-mono)', fontSize: 9, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--fg-faint)', display: 'block', marginBottom: 4 }}>Goal</span>
                            <span style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: ec, lineHeight: 1.5 }}>{skill.goal}</span>
                          </div>
                          <div>
                            <span style={{ fontFamily: 'var(--font-mono)', fontSize: 9, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--fg-faint)', display: 'block', marginBottom: 4 }}>Output</span>
                            <span style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--fg-muted)', lineHeight: 1.5 }}>{skill.output}</span>
                          </div>
                          <div>
                            <span style={{ fontFamily: 'var(--font-mono)', fontSize: 9, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--fg-faint)', display: 'block', marginBottom: 4 }}>Unlocks</span>
                            <span style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--fg-muted)', lineHeight: 1.5 }}>{skill.unlocks}</span>
                          </div>
                        </div>
                        <div style={{ display: 'flex', gap: 8, paddingTop: 4 }}>
                          <Button href={`https://github.com/quinrobinson/ai-strategy-practice-framework/blob/main/skills/${skill.file}`}>↓ Download skill file</Button>
                          <Button href={`https://github.com/quinrobinson/ai-strategy-practice-framework/blob/main/skills/${skill.file}`}>View on GitHub →</Button>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* APDF bridge for Before */}
            {selectedEntry === 'before' && (
              <div style={{ marginTop: 2, padding: '18px 20px', border: '1px solid color-mix(in srgb, var(--brand-purple) 30%, var(--border))', borderRadius: 8, background: 'rgba(134,59,255,0.06)', display: 'flex', alignItems: 'center', gap: 16 }}>
                <div style={{ width: 2, height: 40, background: 'var(--grad-brand)', borderRadius: 1, flexShrink: 0 }} />
                <div>
                  <div style={{ fontFamily: 'var(--font-mono)', fontSize: 9, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--brand-purple-soft)', marginBottom: 4 }}>APDF Bridge — Terminal Step</div>
                  <div style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--fg-muted)', lineHeight: 1.5 }}>
                    When the Before session closes, <code style={{ fontFamily: 'var(--font-mono)', fontSize: 11, padding: '1px 5px', borderRadius: 3, background: 'var(--elevated)', border: '1px solid var(--border)' }}>/project:handoff</code> generates an APDF-ready brief — carrying the problem statement, method decision, risk constraints, and outcome metrics into the design workflow.
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

        {/* Agents activated by this entry */}
        {selectedEntry && relevantAgents.length > 0 && (
          <div>
            <GradRule />
            <div style={{ paddingTop: 40 }}>
              <Eyebrow style={{ marginBottom: 16 }}>Agents activated in a {selectedEntry} session</Eyebrow>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 10 }}>
                {relevantAgents.map(agent => (
                  <div key={agent.id} style={{ padding: '14px 16px', border: `1px solid color-mix(in srgb, ${agent.color} 25%, var(--border))`, borderRadius: 8, background: 'var(--card)', display: 'flex', flexDirection: 'column', gap: 6, position: 'relative', overflow: 'hidden' }}>
                    <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: 2, background: agent.color }} />
                    {agent.alwaysActive && (
                      <span style={{ fontFamily: 'var(--font-mono)', fontSize: 9, letterSpacing: '0.10em', textTransform: 'uppercase', color: agent.color }}>Always active</span>
                    )}
                    <div style={{ fontFamily: 'var(--font-display)', fontSize: 13, fontWeight: 600, color: agent.color }}>{agent.name}</div>
                    <div style={{ fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--fg-dim)', lineHeight: 1.4 }}>{agent.sub}</div>
                  </div>
                ))}
              </div>
              <p style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--fg-dim)', marginTop: 12, fontStyle: 'italic' }}>
                These agents may all be active simultaneously — the Orchestrator synthesizes their perspectives into a single recommendation.
              </p>
            </div>
          </div>
        )}

        {/* Predictor always-on section */}
        {!selectedEntry && (
          <div style={{ marginTop: 16, padding: '24px 28px', border: '1px solid rgba(168,162,158,0.2)', borderRadius: 10, background: 'rgba(168,162,158,0.04)', display: 'flex', gap: 20, alignItems: 'flex-start' }}>
            <div style={{ width: 8, height: 8, borderRadius: 999, background: 'var(--role-predictor)', marginTop: 6, flexShrink: 0, boxShadow: '0 0 8px rgba(168,162,158,0.6)' }} />
            <div>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--role-predictor)', marginBottom: 6 }}>Predictor — Always Active</div>
              <div style={{ fontFamily: 'var(--font-display)', fontSize: 16, fontWeight: 600, marginBottom: 8 }}>Pattern-matching against failure modes — across every session</div>
              <div style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--fg-muted)', lineHeight: 1.6, maxWidth: 640 }}>
                The Predictor runs alongside every agent in every session. It cross-references your inputs against 11 documented failure modes and surfaces warnings at the decision point where they're most actionable — not all at once at session open.
              </div>
              <div style={{ marginTop: 12, display: 'flex', gap: 8 }}>
                <Button onClick={() => go('skills')}>View failure mode library →</Button>
              </div>
            </div>
          </div>
        )}

      </Container>
      <Footer />
    </Page>
  );
}

window.DecisionTreePage = DecisionTreePage;
/* app.jsx — router + mode state */

function App() {
  const [route, setRoute] = React.useState('home');
  const [mode, setMode] = React.useState('team'); // 'team' | 'strategist'

  const go = (r) => {
    setRoute(r);
    window.scrollTo({ top: 0, behavior: 'auto' });
  };

  const handleModeToggle = (newMode) => {
    setMode(newMode);
    window.ASPF_MODE = newMode;
    // Switching to strategist goes to strategist page; back to team goes home
    if (newMode === 'strategist' && route === 'home') go('home');
    if (newMode === 'team' && route === 'strategist') go('home');
  };

  const sharedProps = { go, mode, onModeToggle: handleModeToggle };

  // Strategist page
  if (route === 'strategist') return <StrategistPage {...sharedProps} />;

  // Direct entry points — skip diagnostic picker
  if (route === 'before')  return <StartPage go={go} entry="before" />;
  if (route === 'during')  return <StartPage go={go} entry="during" />;
  if (route === 'after')   return <StartPage go={go} entry="after" />;
  // Guided diagnostic
  if (route === 'diagnose') return <StartPage go={go} entry={null} />;
  // Secondary pages
  if (route === 'skills')  return <SkillsPage go={go} />;
  if (route === 'agents')  return <AgentsPage go={go} />;
  if (route === 'tree')    return <DecisionTreePage go={go} />;

  return <HomePage {...sharedProps} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
