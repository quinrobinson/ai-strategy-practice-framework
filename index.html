/* ============================================================
   ASPF Design System — Tokens
   AI Strategy Practice Framework
   Adapted from APDF Design System by Quin Robinson
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

  --bg-deep:      #000000;

  --elevated:     #202020;

  --border:       #2C2C2C;
  --border-hover: #404040;
  --border-soft:  rgba(255, 255, 255, 0.06);
  --border-strong:rgba(255, 255, 255, 0.12);

  /* ---------- Foreground ---------- */
  --fg:           #F2F2F2;
  --fg-muted:     #999999;
  --fg-dim:       #787878;
  --fg-faint:     #555555;

  /* ---------- Brand accents ---------- */
  --brand-orange:      #E9810C;
  --brand-orange-soft: #FB923C;
  --brand-purple:      #863BFF;
  --brand-purple-soft: #C084FC;

  --grad-brand:      linear-gradient(90deg, #863BFF 0%, #C084FC 35%, #E9810C 100%);
  --grad-brand-soft: linear-gradient(90deg, rgba(134,59,255,0.18) 0%, rgba(233,129,12,0.18) 100%);
  --grad-brand-glow: radial-gradient(60% 80% at 30% 50%, rgba(134,59,255,0.22) 0%, transparent 65%),
                     radial-gradient(60% 80% at 80% 60%, rgba(233,129,12,0.18) 0%, transparent 65%);

  /* ---------- ASPF Entry Point colors ---------- */
  --entry-before:  #3B82F6;   /* Before — blue   */
  --entry-during:  #F59E0B;   /* During — amber  */
  --entry-after:   #EF4444;   /* After  — red    */

  /* ---------- Agent role colors ---------- */
  --role-strategy:    #C084FC;   /* AI Strategy Lead — purple     */
  --role-pm:          #F472B6;   /* AI Product Manager — pink     */
  --role-researcher:  #38BDF8;   /* AI Researcher — sky           */
  --role-ethics:      #34D399;   /* Ethics & Risk Advisor — emerald */
  --role-engineer:    #FB923C;   /* ML/AI Engineer — orange       */
  --role-change:      #FBBF24;   /* Change & Enablement — yellow  */
  --role-practice:    #A78BFA;   /* AI Practice Lead — violet     */
  --role-predictor:   #A8A29E;   /* Predictor — warm gray         */

  /* ---------- Type ---------- */
  --font-display: "Inter", ui-sans-serif, system-ui, sans-serif;
  --font-body:    "DM Sans", ui-sans-serif, system-ui, sans-serif;
  --font-mono:    "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;

  /* Type scale */
  --fs-display:   clamp(48px, 6vw, 88px);
  --fs-h1:        clamp(36px, 4vw, 56px);
  --fs-h2:        clamp(28px, 3vw, 40px);
  --fs-h3:        24px;
  --fs-h4:        18px;
  --fs-body:      14px;
  --fs-body-lg:   15px;
  --fs-small:     13px;
  --fs-xs:        12px;
  --fs-mono:      11px;
  --fs-mono-lg:   12px;

  --ls-mono:      0.08em;
  --ls-mono-wide: 0.16em;
  --ls-display:   -0.02em;

  --lh-tight:  1.05;
  --lh-snug:   1.3;
  --lh-base:   1.65;
  --lh-loose:  1.75;

  /* ---------- Radii ---------- */
  --radius-xs:  3px;
  --radius-sm:  6px;
  --radius-md:  8px;
  --radius-lg:  12px;
  --radius-pill:999px;

  /* ---------- Spacing ---------- */
  --s-1:  4px;  --s-2:  8px;  --s-3:  12px; --s-4:  16px;
  --s-5:  20px; --s-6:  24px; --s-8:  32px; --s-10: 40px;
  --s-12: 48px; --s-16: 64px; --s-20: 80px;

  /* ---------- Shadows ---------- */
  --shadow-sm:  0 1px 2px rgba(0,0,0,0.4);
  --shadow-md:  0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg:  0 12px 40px rgba(0,0,0,0.5);

  --dur-base:    200ms;

                      { n: '03', content: <><code style={{ fontFamily: 'var(--font-mono)', fontSize: 10, padding: '1px 4px', borderRadius: 3, background: 'var(--elevated)', border: '1px solid var(--border)', color: 'var(--brand-orange-soft)' }}>/project:deck [skill]</code> to generate a stakeholder PowerPoint</> },
                    ].map(s => (
                      <div key={s.n} style={{ display: 'flex', gap: 12, alignItems: 'flex-start', marginBottom: 12 }}>

                    <a href="https://github.com/quinrobinson/ai-strategy-practice-framework" target="_blank" rel="noopener noreferrer" style={{ fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.10em', textTransform: 'uppercase', padding: '7px 14px', borderRadius: 5, background: `color-mix(in srgb, ${color} 15%, transparent)`, color: color, border: `1px solid color-mix(in srgb, ${color} 30%, transparent)`, textDecoration: 'none', display: 'inline-block' }}>

                  </div>
                )}
              </div>
            </div>

            {/* Gaps */}
            {gaps.length > 0 && (
              <div style={{ marginTop: 24, padding: '14px 16px', border: '1px dashed var(--border)', borderRadius: 8, display: 'flex', alignItems: 'center', gap: 12 }}>

              </div>
            )}
          </div>
        </div>

        {/* Pillar navigation — quick jump to others */}
        <div style={{ paddingTop: 40, paddingBottom: 64 }}>
          <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--fg-faint)', marginBottom: 14 }}>Other pillars</div>

                {p.number} — {p.shortName}
              </button>
            ))}
          </div>
        </div>

      </div>
      <Footer go={go} />
    </Page>
  );
}

function DecisionTreePage({ go }) {
  const { entryPoints, skills, agents } = window.ASPF_DATA;
  const [selectedEntry, setSelectedEntry] = React.useState(null);
  const [selectedSkill, setSelectedSkill] = React.useState(null);

  const entryColors = { before: 'var(--entry-before)', during: 'var(--entry-during)', after: 'var(--entry-after)' };

  const beforeSkills = skills.filter(s => s.entryPoint === 'before').sort((a, b) => a.step - b.step);
  const duringSkills = skills.filter(s => s.entryPoint === 'during');
  const afterSkills  = skills.filter(s => s.entryPoint === 'after');
  const alwaysSkills = skills.filter(s => s.entryPoint === 'all');

  const skillsByEntry = { before: beforeSkills, during: duringSkills, after: afterSkills };

  const relevantAgents = selectedEntry
    ? agents.filter(a => a.alwaysActive || a.commands.some(c => {
        if (selectedEntry === 'before') return c.includes('diagnose');
        if (selectedEntry === 'during') return c.includes('audit');
        if (selectedEntry === 'after') return c.includes('retro');
        return false;
      }))
    : [];

  const layers = [
    { label: 'Layer 0', name: 'Entry Detection', desc: 'Passive language signal detection from opening message. Fallback to one clarifying question if ambiguous.', color: 'var(--fg-dim)' },
    { label: 'Layer 1', name: 'Context Snapshot', desc: 'Three questions: domain, team composition, prior decisions. Predictor first sweep runs immediately after.', color: 'var(--brand-orange)' },
    { label: 'Layer 2', name: 'Branch Intake', desc: 'Framing questions together, then adaptive follow-ups. Agents activated by need. Skills routed in sequence.', color: 'var(--brand-purple-soft)' },
    { label: 'Layer 3', name: 'Synthesis', desc: 'Session closes: agents activated, skills run, Predictor flags, open questions, one explicit next action.', color: 'var(--fg)' },

  return (
    <Page>
      <Header active="tree" go={go} />
      <Container style={{ paddingTop: 32, paddingBottom: 96 }}>

        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 32 }}>

        <h1 style={{ fontFamily: 'var(--font-display)', fontSize: 'clamp(36px, 4vw, 52px)', fontWeight: 600, lineHeight: 1.08, letterSpacing: '-0.02em', marginBottom: 12 }}>
          The Decision Tree
        </h1>
        <p style={{ fontFamily: 'var(--font-body)', fontSize: 15, color: 'var(--fg-muted)', lineHeight: 1.65, maxWidth: 640, marginBottom: 48 }}>

        </p>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 2, marginBottom: 48 }}>
          {layers.map((l, i) => (
            <div key={l.label} style={{ padding: '20px 20px', border: '1px solid var(--border)', background: 'var(--card)', borderRadius: 8, position: 'relative' }}>
              {i < layers.length - 1 && (
                <div style={{ position: 'absolute', right: -12, top: '50%', transform: 'translateY(-50%)', zIndex: 2, fontFamily: 'var(--font-mono)', fontSize: 14, color: 'var(--fg-faint)' }}>→</div>
              )}
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--fg-faint)', marginBottom: 8 }}>{l.label}</div>
              <div style={{ fontFamily: 'var(--font-display)', fontSize: 14, fontWeight: 600, color: l.color, marginBottom: 8 }}>{l.name}</div>
              <div style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--fg-muted)', lineHeight: 1.55 }}>{l.desc}</div>
            </div>
          ))}
        </div>

        <GradRule />

        {/* Entry Point selector */}

            {entryPoints.map(ep => {
              const isSelected = selectedEntry === ep.id;
              const c = entryColors[ep.id];
              return (
                <button key={ep.id} onClick={() => { setSelectedEntry(isSelected ? null : ep.id); setSelectedSkill(null); }} style={{ padding: '20px 22px', border: `1px solid ${isSelected ? c : 'var(--border)'}`, borderRadius: 10, background: isSelected ? `color-mix(in srgb, ${c} 8%, var(--card))` : 'var(--card)', cursor: 'pointer', textAlign: 'left', transition: 'all 200ms', display: 'flex', flexDirection: 'column', gap: 8 }}>

                        </div>

            {/* APDF bridge for Before */}

        {/* Agents activated by this entry */}
        {selectedEntry && relevantAgents.length > 0 && (
          <div>

/* app.jsx — pillar-first router, no mode toggle */

function App() {
  const [route, setRoute] = React.useState('home');
  const go = (r) => { setRoute(r); window.scrollTo({ top: 0, behavior: 'auto' }); };

  // Pillar routes
  if (route.startsWith('pillar-')) {
    const pillarId = route.replace('pillar-', '');
    return <PillarPage go={go} pillarId={pillarId} />;
  }

  // Foundation
  if (route === 'foundation') return <FoundationPage go={go} />;

  // Lifecycle entry points
  if (route === 'before')  return <StartPage go={go} entry="before" />;
  if (route === 'during')  return <StartPage go={go} entry="during" />;
  if (route === 'after')   return <StartPage go={go} entry="after" />;
  if (route === 'diagnose') return <StartPage go={go} entry={null} />;

  // Secondary pages
  if (route === 'skills')  return <SkillsPage go={go} />;
  if (route === 'agents')  return <AgentsPage go={go} />;
  if (route === 'tree')    return <DecisionTreePage go={go} />;

  return <HomePage go={go} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
